- name: Install Node.js
  apt:
    name: nodejs
    state: present
    update_cache: yes

- name: Install npm
  apt:
    name: npm
    state: present

- name: Create app directory
  file:
    path: /home/ec2-user/app
    state: directory

- name: Copy app files
  copy:
    src: /app/
    dest: /home/ec2-user/app/

- name: Install node modules
  command: npm install
  args:
    chdir: /home/ec2-user/app

- name: Install pm2 globally
  npm:
    name: pm2
    state: present
    global: yes

- name: Start the app
  command: pm2 start server.js
  args:
    chdir: /home/ec2-user/app

